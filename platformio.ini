; sensor-watch-ir-tools
;
; The firmware is a single type: a dumb half-duplex IR modem for the flasher:
; a byte pipe driven by bin/firmware_flasher.py over USB (the host owns all framing/CRC/
; ACK/UF2/retransmit logic). It ships in two drop-in-equivalent variants, one
; per target board, identical from the host's point of view:
;
;   * src/modem_arduino_uno.cpp        - Arduino UNO       (Timer1 bit-bang)
;   * src/modem_xiao_samd21.cpp - Seeed XIAO SAMD21 (TC4 bit-bang + EIC edge ISR)
;
; Each env selects exactly one source file via build_src_filter so we never end
; up with multiple setup()/loop() pairs in one binary.
;
; Bring-up: pio run -e <env> -t upload

[platformio]
default_envs = modem_arduino_uno

[env]
build_src_filter = -<*>

; Half-duplex IR modem firmware for the Arduino UNO. A dumb byte pipe: the host
; (bin/firmware_flasher.py) drives it with a binary command protocol over USB @ 115200
; (decoupled from the IR baud) to transmit a frame out the LED (D9) and then
; receive the watch's reply off the phototransistor (D8/ICP1), forwarding every
; decoded byte back to the host. All framing/CRC/ACK/UF2/retransmit logic lives
; on the host. Self-contained (owns mode-aware Timer1 ISRs).
; Wiring: LED on D9 (PB1), phototransistor on D8 (PB0/ICP1).
;
; Build/flash:  pio run -e modem_arduino_uno -t upload
[env:modem_arduino_uno]
platform = atmelavr
board = uno
framework = arduino
build_src_filter = ${env.build_src_filter} +<modem_arduino_uno.cpp>
; Buffer host->modem command bytes (a full frame can be ~540 B) so we don't
; drop any while send_blob() is busy transmitting the previous frame.
build_flags =
    -DSERIAL_RX_BUFFER_SIZE=256
monitor_speed = 115200

; Half-duplex IR modem firmware for the Seeed XIAO SAMD21. Same dumb-byte-pipe
; host protocol as modem_arduino_uno, and (like the UNO) it bit-bangs the
; optical link in SOFTWARE (TC4 compare = bit clock; PT edge timestamps from an
; EIC interrupt reading the free-running TC4 COUNT). Software encode/decode means
; we control polarity, so IrDA
; AND NRZ work in BOTH directions on the active-high-LED / idle-high-PT wiring
; (no external inverter). This replaced an earlier SERCOM/SIR version whose fixed
; decoder polarity couldn't read this jig's phototransistor in IrDA. USB-CDC to
; the host (native USB; the 115200 is nominal).
;
; Wiring: IR LED on PA06 (D10), phototransistor on PA07 (D8/SCK, EIC EXTINT7).
; See modem_xiao_samd21.cpp's header (and its BRING-UP NOTE).
;
; Build/flash:  pio run -e modem_xiao_samd21 -t upload
[env:modem_xiao_samd21]
platform = atmelsam
board = seeed_xiao
framework = arduino
build_src_filter = ${env.build_src_filter} +<modem_xiao_samd21.cpp>
monitor_speed = 115200
